<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#000000" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin · Shouli</title>
  <link rel="icon" type="image/png" href="icons/flavicon.png" />
  <link rel="stylesheet" href="tailwind.css" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { background: #0b0b0d; color: #fff; min-height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 32px 16px;
    }
    .admin-page-card {
      width: 100%;
      max-width: 480px;
      background: rgba(20, 22, 28, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
    }
    .admin-page-card h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 4px;
    }
    .admin-page-card .sub {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 22px;
    }
  </style>
</head>

<body class="dark">
  <div class="admin-page-card">
    <h1>Cloud Status</h1>
    <p class="sub">Protected by Cloudflare Access. Edit and push to GitHub.</p>

    <div class="admin-label">Doing (Phase)</div>
    <div id="adm-doing-chips" class="admin-chips"></div>

    <div class="admin-label">Project / Note</div>
    <input type="text" id="adm-rn-note" class="admin-field" placeholder="Milano BTS · Day 3" />

    <div class="admin-label">Status Description</div>
    <input type="text" id="adm-rn-detail" class="admin-field" placeholder="Deep in the edit. Coffee on the desk..." />

    <div class="admin-label">Vibe / Energy</div>
    <div id="adm-vibe-chips" class="admin-chips"></div>

    <div class="admin-label">Working on</div>
    <input type="text" id="adm-working-on" class="admin-field" placeholder="Short description (optional)" />

    <button id="adm-save-btn" class="admin-btn">Push to Cloud</button>
    <div id="adm-status" style="font-size:11px; margin-top:10px; text-align:center; opacity:0.8;"></div>

    <div style="margin-top:24px; text-align:center;">
      <a href="/" style="font-size:12px; color:rgba(255,255,255,0.4); text-decoration:none;">← back to site</a>
    </div>
  </div>

  <script type="module" src="admin.js"></script>
</body>

</html>
